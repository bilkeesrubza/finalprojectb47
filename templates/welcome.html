{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container-fluid min-vh-100 d-flex align-items-center">
  <div class="row w-100">

    <!-- LEFT SIDE -->
    <div class="col-md-6 d-flex flex-column justify-content-center ps-5">
      <h1 class="fw-bold text-primary">Welcome to Medora 💙</h1>
      <p class="text-muted fs-5">
        Your trusted healthcare appointment system.
      </p>
      <p class="text-secondary">
        Please login to continue or register if you are new.
      </p>
    </div>

    <!-- RIGHT SIDE LOGIN CARD -->
    <div class="col-md-4 offset-md-1">
      <div class="card shadow-lg border-0 p-4">
        <h4 class="text-center mb-3">Patient Login</h4>

        <form method="post" action="{% url 'patient_login' %}" autocomplete="off">
  {% csrf_token %}

  <div class="mb-3">
    <label>Username</label>
    <input type="text" name="username" class="form-control" required autocomplete="off">
  </div>

  <div class="mb-3">
    <label>Password</label>
    <input type="password" name="password" class="form-control" required autocomplete="new-password">
  </div>

  <button type="submit" class="btn btn-primary w-100">
    Login
  </button>
  <p class="text-center mt-3">
  Don’t have an account?
  <a href="{% url 'register' %}">Register</a>
</p>
</form>
      </div>
    </div>

  </div>
</div>
{% endblock %}
