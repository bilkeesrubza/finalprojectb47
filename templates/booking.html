{% extends 'base.html'%}
{% load static %}
{% block content%}
<!DOCTYPE html>
<link rel="stylesheet" href="{% static 'css/style.css' %}">
<html>
<div class="appointment-wrapper">
  <div class="appointment-card">
    <h2 class="title">Make Appointment</h2>

    <form method="post">
      {% csrf_token %}

      <div class="form-group">
        <label>Patient name</label>
         <input type="text" value="{{ request.user.username }}"readonly>
      </div>

      <div class="form-group">
        <label>Department</label>
        {{ form.dep_name }}
      </div>

      <div class="form-group">
        <label>Doctor</label>
        {{ form.doc_name }}
      </div>

      <div class="form-group">
        <label>Booking date</label>
        {{ form.booking_date }}
        {{form.booking_date.errors}}
      
      </div>
      <div class="form-group">
        <label>appointment Time</label>
        {{ form.appointment_time }}
      </div>

      <button type="submit" class="btn-submit" name="book_btn">Book Appointment</button>
    </form>
  </div>
</div>
<script>
  document.querySelectorAll(
  'select[name="doc_name"], input[name="booking_date"]'
).forEach(function(el) {
  el.addEventListener('change', function() {
    var form = this.closest('form');
    var doc = form.querySelector('select[name="doc_name"]');
    var date = form.querySelector('input[name="booking_date"]');

    if (doc.value && date.value) {
      form.submit(); 
    }
  });
});
</script>


{% endblock %}
